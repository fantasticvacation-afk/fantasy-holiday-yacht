<!DOCTYPE html>
<html lang="zh-CN">
<head>
<meta charset="utf-8">
<meta name="viewport" content="width=device-width,initial-scale=1.0">
<title>移动端导航栏测试</title>
<style>
body {
  font-family: -apple-system, BlinkMacSystemFont, 'Segoe UI', sans-serif;
  padding: 20px;
  max-width: 800px;
  margin: 0 auto;
}
.test-section {
  margin: 20px 0;
  padding: 20px;
  border: 1px solid #e5e7eb;
  border-radius: 8px;
}
.test-result {
  margin: 10px 0;
  padding: 10px;
  border-radius: 4px;
}
.pass { background: #d1fae5; color: #065f46; }
.fail { background: #fee2e2; color: #991b1b; }
button.test-btn {
  padding: 10px 20px;
  background: #3b82f6;
  color: white;
  border: none;
  border-radius: 6px;
  cursor: pointer;
  margin: 5px;
}
button.test-btn:hover { background: #2563eb; }
#test-output {
  margin-top: 20px;
  padding: 15px;
  background: #f3f4f6;
  border-radius: 6px;
  font-family: monospace;
  white-space: pre-wrap;
}
</style>
</head>
<body>
<h1>🔍 移动端导航栏测试</h1>

<div class="test-section">
  <h2>1. 汉堡按钮测试</h2>
  <button class="test-btn" onclick="testHamburger()">测试汉堡按钮</button>
  <div id="hamburger-test"></div>
</div>

<div class="test-section">
  <h2>2. 移动端菜单测试</h2>
  <button class="test-btn" onclick="testMobileMenu()">测试移动端菜单</button>
  <div id="menu-test"></div>
</div>

<div class="test-section">
  <h2>3. toggleMobile 函数测试</h2>
  <button class="test-btn" onclick="testToggleFunction()">测试函数</button>
  <div id="function-test"></div>
</div>

<div class="test-section">
  <h2>4. 手动测试</h2>
  <button class="test-btn" onclick="toggleMobile()">打开/关闭移动端菜单</button>
  <p>点击上面按钮，应该能看到移动端菜单打开/关闭</p>
</div>

<div id="test-output"></div>

<script>
function log(msg) {
  document.getElementById('test-output').textContent += msg + '\n';
}

function testHamburger() {
  const hamburger = document.querySelector('.hamburger');
  const output = document.getElementById('hamburger-test');

  if (!hamburger) {
    output.innerHTML = '<div class="test-result fail">❌ 未找到汉堡按钮</div>';
    return;
  }

  let html = '<div class="test-result pass">✅ 汉堡按钮存在</div>';
  html += `<p>标签: ${hamburger.tagName}</p>`;
  html += `<p>类名: ${hamburger.className}</p>`;
  html += `<p>onclick: ${hamburger.onclick ? '有' : '无'}</p>`;
  html += `<p>display: ${getComputedStyle(hamburger).display}</p>`;
  html += `<p>z-index: ${getComputedStyle(hamburger).zIndex}</p>`;
  html += `<p>pointer-events: ${getComputedStyle(hamburger).pointerEvents}</p>`;

  output.innerHTML = html;
  log('汉堡按钮测试完成');
}

function testMobileMenu() {
  const menu = document.getElementById('mobile-menu');
  const output = document.getElementById('menu-test');

  if (!menu) {
    output.innerHTML = '<div class="test-result fail">❌ 未找到移动端菜单</div>';
    return;
  }

  let html = '<div class="test-result pass">✅ 移动端菜单存在</div>';
  html += `<p>active状态: ${menu.classList.contains('active') ? '是' : '否'}</p>`;
  html += `<p>z-index: ${getComputedStyle(menu).zIndex}</p>`;
  html += `<p>opacity: ${getComputedStyle(menu).opacity}</p>`;
  html += `<p>visibility: ${getComputedStyle(menu).visibility}</p>`;

  output.innerHTML = html;
  log('移动端菜单测试完成');
}

function testToggleFunction() {
  const output = document.getElementById('function-test');

  if (typeof toggleMobile === 'function') {
    output.innerHTML = '<div class="test-result pass">✅ toggleMobile 函数存在</div>';
    log('toggleMobile 函数测试通过');
  } else {
    output.innerHTML = '<div class="test-result fail">❌ toggleMobile 函数不存在</div>';
    log('toggleMobile 函数测试失败');
  }
}

// 页面加载完成后自动运行所有测试
window.addEventListener('DOMContentLoaded', () => {
  log('=== 移动端导航栏自动测试 ===\n');

  setTimeout(() => {
    testHamburger();
    testMobileMenu();
    testToggleFunction();
    log('\n所有测试完成！');
  }, 500);
});
</script>

<!-- 实际的移动端导航栏组件 -->
<nav id="navbar" style="position:fixed;top:0;left:0;right:0;height:64px;background:white;z-index:9999;display:flex;align-items:center;padding:0 16px;">
  <div style="flex:1"></div>
  <div class="nav-actions" style="display:flex;align-items:center;gap:8px;">
    <div class="hamburger" onclick="toggleMobile()" style="display:flex;flex-direction:column;gap:5px;cursor:pointer;padding:8px;">
      <span style="width:22px;height:2px;background:#333;border-radius:2px;"></span>
      <span style="width:22px;height:2px;background:#333;border-radius:2px;"></span>
      <span style="width:22px;height:2px;background:#333;border-radius:2px;"></span>
    </div>
  </div>
</nav>

<div class="mobile-menu" id="mobile-menu" style="position:fixed;inset:0;background:white;z-index:10002;display:flex;flex-direction:column;opacity:0;visibility:hidden;transition:opacity 0.3s;">
  <div style="padding:80px 24px 24px;">
    <h2>移动端菜单</h2>
    <p>这是测试菜单内容</p>
    <a href="#" style="display:block;padding:14px 0;border-bottom:1px solid #eee;">首页</a>
    <a href="#" style="display:block;padding:14px 0;border-bottom:1px solid #eee;">关于我们</a>
    <a href="#" style="display:block;padding:14px 0;border-bottom:1px solid #eee;">联系我们</a>
  </div>
</div>

<script>
function toggleMobile() {
  const menu = document.getElementById('mobile-menu');
  const hamburger = document.querySelector('.hamburger');

  if (menu) {
    menu.classList.toggle('active');
    if (menu.classList.contains('active')) {
      menu.style.opacity = '1';
      menu.style.visibility = 'visible';
    } else {
      menu.style.opacity = '0';
      menu.style.visibility = 'hidden';
    }
  }

  if (hamburger) {
    hamburger.classList.toggle('active');
  }

  log('toggleMobile() 被调用 - 菜单状态: ' + (menu.classList.contains('active') ? '打开' : '关闭'));
}
</script>

</body>
</html>
